name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Scaffold Full Android Project Architecture
      run: |
        # 1. Force establish standard Android structures
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/java/com/example/webwrapper
        
        # 2. Safely relocate structural assets
        [ -f AndroidManifest.xml ] && cp AndroidManifest.xml app/src/main/AndroidManifest.xml || true
        [ -f activity_main.xml ] && cp activity_main.xml app/src/main/res/layout/activity_main.xml || true
        [ -f MainActivity.java ] && cp MainActivity.java app/src/main/java/com/example/webwrapper/MainActivity.java || true

        # 3. Inject critical project-level gradle configuration
        echo "include ':app'" > settings.gradle
        
        echo "buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects {
            repositories { google(); mavenCentral() }
        }" > build.gradle

        # 4. Inject application-level dependencies and SDK configuration
        echo "plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.webwrapper'
            compileSdk 34
            defaultConfig {
                applicationId 'com.example.webwrapper'
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
            buildTypes {
                release {
                    minifyEnabled false
                }
            }
        }" > app/build.gradle

        # 5. Generate pristine local settings configurations
        echo "sdk.dir=/usr/local/lib/android/sdk" > local.properties

    - name: Setup Gradle System
      run: gradle wrapper --gradle-version 8.5

    - name: Run Production Compilation
      run: ./gradlew assembleDebug

    - name: Archive and Export Package
      uses: actions/upload-artifact@v4
      with:
        name: WebWrapper-APK
        path: app/build/outputs/apk/debug/app-debug.apk
