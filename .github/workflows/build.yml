name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Initialize Android Project
      run: |
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/java/com/example/webwrapper
        
        # Move files to standard Android layout if they are in root
        [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/ || true
        [ -f main.xml ] && mv main.xml app/src/main/res/layout/activity_main.xml || true
        [ -f activity_main.xml ] && mv activity_main.xml app/src/main/res/layout/ || true
        [ -f MainActivity.java ] && mv MainActivity.java app/src/main/java/com/example/webwrapper/ || true

        # Build minimalist configuration files needed for a quick build
        echo "include ':app'" > settings.gradle
        
        echo "buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }" > build.gradle

        echo "plugins {
            id 'com.android.application'
        }
        android {
            namespace 'com.example.webwrapper'
            compileSdk 34
            defaultConfig {
                applicationId 'com.example.webwrapper'
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName '1.0'
            }
        }" > app/build.gradle

    - name: Setup Gradle
      run: gradle wrapper --gradle-version 8.5

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: WebWrapper-APK
        path: app/build/outputs/apk/debug/app-debug.apk
